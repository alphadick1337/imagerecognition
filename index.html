<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Bildigenkänning med TensorFlow</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin:40px;
}
img{
    max-width:300px;
    margin-top:20px;
}
</style>

</head>
<body>

<h1>Bildigenkänning</h1>

<input type="file" id="imageUpload">

<br>
<img id="preview">

<h2 id="result">Laddar modell...</h2>

<script>

let model;

async function loadModel(){
    model = await tf.loadLayersModel('model/model.json');
    document.getElementById("result").innerText = "Modell laddad";
}

loadModel();

document.getElementById("imageUpload").addEventListener("change", async function(e){

    const file = e.target.files[0];
    const img = document.getElementById("preview");

    img.src = URL.createObjectURL(file);

    img.onload = async () => {

        const tensor = tf.browser.fromPixels(img)
            .resizeNearestNeighbor([224,224])
            .toFloat()
            .expandDims();

        const prediction = await model.predict(tensor).data();

        const index = prediction.indexOf(Math.max(...prediction));

        document.getElementById("result").innerText =
        "Prediktion klass: " + index +
        " (" + prediction[index].toFixed(3) + ")";
    }

});

</script>

</body>
</html>
