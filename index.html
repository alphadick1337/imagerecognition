<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>TensorFlow Bildigenkänning</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
margin-top:40px;
}

img{
max-width:300px;
margin-top:20px;
border-radius:10px;
}

#status{
font-size:20px;
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>Bildigenkänning</h1>

<input type="file" id="imageInput">

<br>

<img id="preview">

<div id="status">Laddar modell...</div>

<script>

let model;

async function loadModel(){

try{

model = await tf.loadLayersModel(
tf.io.browserHTTPRequest("model.json",{
credentials: "same-origin"
})
);

document.getElementById("status").innerText = "Modell laddad ✓";

console.log("Model loaded");

}catch(err){

console.error(err);
document.getElementById("status").innerText = "Fel vid laddning av modell";

}

}

loadModel();


document.getElementById("imageInput").addEventListener("change", async function(e){

if(!model){
alert("Modellen är inte laddad ännu");
return;
}

const file = e.target.files[0];
const img = document.getElementById("preview");

img.src = URL.createObjectURL(file);

img.onload = async () => {

let tensor = tf.browser.fromPixels(img)
.resizeNearestNeighbor([224,224])
.toFloat()
.div(255.0)
.expandDims();

let prediction = model.predict(tensor);
let data = await prediction.data();

let max = Math.max(...data);
let index = data.indexOf(max);

document.getElementById("status").innerText =
"Klass: " + index + " | Säkerhet: " + (max*100).toFixed(2) + "%";

}

});

</script>

</body>
</html>
