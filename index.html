<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>TensorFlow Bildigenkänning</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
    margin-top: 40px;
}

img {
    max-width: 300px;
    margin-top: 20px;
    border-radius: 10px;
}

#status {
    font-size: 20px;
    margin-top: 20px;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>Bildigenkänning</h1>

<input type="file" id="imageInput">
<br>
<img id="preview">
<div id="status">Laddar modell...</div>

<script>
let model;

async function loadModel() {
    try {
        // Fix 1 & 2: Vi använder loadGraphModel och en relativ sökväg ('./')
        model = await tf.loadGraphModel('./model.json');
        
        document.getElementById("status").innerText = "Modell laddad ✓";
        console.log("Model loaded successfully");
    } catch(err) {
        console.error("Fel vid laddning:", err);
        document.getElementById("status").innerText = "Fel vid laddning av modell (se konsolen)";
    }
}

loadModel();

document.getElementById("imageInput").addEventListener("change", async function(e) {
    if(!model) {
        alert("Modellen håller fortfarande på att laddas, vänta lite!");
        return;
    }

    const file = e.target.files[0];
    if(!file) return; // Avbryter om användaren stänger fönstret utan att välja fil

    const img = document.getElementById("preview");
    img.src = URL.createObjectURL(file);

    img.onload = async () => {
        document.getElementById("status").innerText = "Analyserar bild...";

        try {
            // Förbereder bilden för modellen
            let tensor = tf.browser.fromPixels(img)
                .resizeNearestNeighbor([224, 224])
                .toFloat()
                .div(255.0)
                .expandDims();

            // Kör modellen
            let prediction = model.predict(tensor);
            
            // Hanterar outputen (GraphModels kan ibland returnera arrayer istället för en enda tensor)
            let data = await (Array.isArray(prediction) ? prediction[0].data() : prediction.data());

            // Hittar vilken klass som fick högst poäng
            let max = Math.max(...data);
            let index = data.indexOf(max);

            document.getElementById("status").innerText =
                "Klass: " + index + " | Säkerhet: " + (max*100).toFixed(2) + "%";
                
            // Viktigt: Rensa upp minnet från grafikkortet/processorn
            tf.dispose([tensor, prediction]);

        } catch (error) {
            console.error("Fel vid prediktion:", error);
            document.getElementById("status").innerText = "Ett fel uppstod vid analysen.";
        }
    }
});
</script>

</body>
</html>
