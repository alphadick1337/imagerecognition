<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Bildigenkänning</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:40px;
background:#f2f2f2;
}

img{
max-width:300px;
margin-top:20px;
border-radius:10px;
}

#status{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>TensorFlow Bildigenkänning</h1>

<input type="file" id="imageInput">

<br>

<img id="preview">

<div id="status">Laddar modell...</div>

<script>

let model;

async function init(){

try{

model = await tf.loadLayersModel('./model.json');

document.getElementById("status").innerText = "Modell laddad ✓";

}catch(error){

console.error(error);
document.getElementById("status").innerText = "Kunde inte ladda modellen";

}

}

init();

document.getElementById("imageInput").addEventListener("change", async function(event){

if(!model){
alert("Modellen är inte laddad än");
return;
}

const file = event.target.files[0];
const img = document.getElementById("preview");

img.src = URL.createObjectURL(file);

img.onload = async function(){

let tensor = tf.browser.fromPixels(img)
.resizeNearestNeighbor([224,224])
.toFloat()
.div(255)
.expandDims();

let prediction = model.predict(tensor);
let data = await prediction.data();

let max = Math.max(...data);
let index = data.indexOf(max);

document.getElementById("status").innerText =
"Klass: " + index + " | Säkerhet: " + (max*100).toFixed(2) + "%";

}

});

</script>

</body>
</html>
