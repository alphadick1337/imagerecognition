<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>TensorFlow Bildigenkänning</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

<style>
body{
font-family: Arial;
text-align:center;
margin:40px;
background:#f5f5f5;
}

h1{
color:#333;
}

img{
max-width:300px;
margin-top:20px;
border-radius:10px;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>

</head>
<body>

<h1>Bildigenkänning</h1>

<p>Ladda upp en bild</p>

<input type="file" id="imageUpload">

<br>
<img id="preview">

<div id="result">Laddar modell...</div>

<script>

let model;

async function loadModel(){

    model = await tf.loadLayersModel("model.json");

    document.getElementById("result").innerText = "Modell laddad";
}

loadModel();

document.getElementById("imageUpload").addEventListener("change", function(e){

    const file = e.target.files[0];
    const img = document.getElementById("preview");

    img.src = URL.createObjectURL(file);

    img.onload = async () => {

        let tensor = tf.browser.fromPixels(img)
        .resizeNearestNeighbor([224,224])
        .toFloat()
        .div(255.0)
        .expandDims();

        let prediction = model.predict(tensor);

        let data = await prediction.data();

        let max = Math.max(...data);
        let index = data.indexOf(max);

        document.getElementById("result").innerText =
        "Prediktion klass: " + index +
        " | Säkerhet: " + (max*100).toFixed(2) + "%";
    }

});

</script>

</body>
</html>
